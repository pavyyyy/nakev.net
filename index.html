                    <p id="clock"></p>

                    <h6><script>
                        function showTime() {
                            // Get the current time
                            var currentTime = new Date();

                            // Extract the hours, minutes, and seconds from the current time
                            var hours = currentTime.getHours();
                            var minutes = currentTime.getMinutes();
                            var seconds = currentTime.getSeconds();
                            var milliseconds = currentTime.getMilliseconds();


                            // Format the time as a string (e.g. "11:30:45")
                            var timeString = hours + ":" + minutes + ":" + seconds + ":" + milliseconds;

                            // Get the element with the ID "clock" and set its text to the time string
                            var clockElement = document.getElementById("clock");
                            clockElement.textContent = timeString;
                        }

                        // Show the time every 1000 milliseconds (1 second)
                        setInterval(showTime, 100);
                    </script></h6>
